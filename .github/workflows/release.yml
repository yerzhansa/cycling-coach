name: Release

on:
  push:
    branches: [main]

# PG-16: per-job least-privilege; id-token only on publish.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        # Reads `packageManager` from root package.json (corepack-style pin).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build

  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm test

  smoke:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      matrix:
        binary: [cycling-coach, running-coach, duathlon-coach]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Pack and smoke ${{ matrix.binary }}
        # PG-8: no `|| true`; set -euo pipefail; 30s timeout (cold Alpine OK).
        # pnpm pack rewrites workspace:* to actual versions in the tarball.
        # Use npm install (not pnpm) to simulate end-user `npm i -g <binary>`.
        run: |
          set -euo pipefail
          cd packages/${{ matrix.binary }}
          pnpm pack --pack-destination /tmp/smoke-${{ matrix.binary }}
          mkdir -p /tmp/smoke-extract-${{ matrix.binary }}
          tar -xf /tmp/smoke-${{ matrix.binary }}/*.tgz -C /tmp/smoke-extract-${{ matrix.binary }} --strip-components=1
          cd /tmp/smoke-extract-${{ matrix.binary }}
          npm install --omit=dev
          timeout 30 node dist/index.js --help

  publish:
    runs-on: ubuntu-latest
    needs: [build, test, smoke]
    permissions:
      contents: write
      pull-requests: write
      id-token: write   # PG-16: OIDC, scoped to publish job only.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Create Version PR or publish
        uses: changesets/action@v1.4   # PG-15: pin major version
        with:
          version: |
            pnpm exec changeset version
            pnpm exec tsx tools/bump-binaries-to-calver.ts
          publish: pnpm publish -r --access public --no-git-checks
          # `pnpm publish -r` walks all packages and publishes the ones whose
          # version isn't already on npm (idempotent on partial-publish failure).
          # `--no-git-checks` skips pnpm's "must be on a clean git tag" check —
          # changesets/action commits version bumps but doesn't tag per package.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — OIDC trusted publisher per PG-7.
          # Operator [runtime] AC: configure each scoped npm package's "Trusted
          # Publisher" to GitHub repo + workflow path .github/workflows/release.yml.
